<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary Meta ───────────────────────────── -->
    <title>BoneHard | Digital Surgical Guides and Prosthetics</title>
    <meta
      name="description"
      content="BoneHard delivers precision digital surgical guides and custom prosthetics for dental professionals in Dubai, UAE and across the GCC. Upload your case and get started."
    />
    <meta
      name="keywords"
      content="BoneHard, dental surgical guides, digital prosthetics, maxillofacial, implant guides, Dubai, UAE, GCC"
    />
    <meta name="author" content="BoneHard" />
    <meta name="theme-color" content="#050505" />
    <link rel="canonical" href="https://bonehard.com/" />

    <!-- ── Open Graph / Social Media ─────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BoneHard" />
    <meta property="og:url" content="https://bonehard.com/" />
    <meta property="og:title" content="BoneHard | Digital Surgical Guides and Prosthetics" />
    <meta
      property="og:description"
      content="Precision digital surgical guides and custom prosthetics for dental professionals. Based in Dubai, UAE — serving the GCC and beyond."
    />
    <meta property="og:image" content="/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BoneHard — Digital Surgical Guides and Prosthetics" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BoneHard | Digital Surgical Guides and Prosthetics" />
    <meta
      name="twitter:description"
      content="Precision digital surgical guides and custom prosthetics for dental professionals in Dubai, UAE."
    />
    <meta name="twitter:image" content="/assets/og-image.png" />

    <!-- ── Favicon ────────────────────────────────── -->
    <link rel="icon" type="image/webp" href="/assets/logo/new_logo.webp" />

    <!-- ── Fonts: Self-hosted via @fontsource (no Google tracking) ── -->

    <!-- ── Performance: Critical Asset Preload ────── -->
    <link rel="preload" as="image" href="/assets/logo/new_logo.webp" />

    <!-- ── JSON-LD Structured Data (Organization) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "BoneHard",
      "url": "https://bonehard.com",
      "logo": "https://bonehard.com/assets/logo/new_logo.webp",
      "description": "BoneHard delivers precision digital surgical guides and custom prosthetics for dental professionals in Dubai, UAE and across the GCC.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dubai",
        "addressCountry": "AE"
      },
      "sameAs": []
    }
    </script>

    <!-- ── Theme Initialization & FOUC Prevention ────── -->
    <!--
      This runs synchronously BEFORE the browser renders anything.
      We apply background-color as a direct inline style to guarantee
      no flash occurs while Vite loads styles.css and its CSS variables.
    -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          var theme = 'dark';
          if (stored === 'light' || stored === 'dark') {
            theme = stored;
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
            theme = 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          // Apply background-color directly via inline style so it takes effect
          // immediately, before any CSS file (and its variables) is parsed.
          var bg = theme === 'light' ? '#ffffff' : '#000000';
          document.documentElement.style.backgroundColor = bg;
          document.documentElement.style.margin = '0';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
